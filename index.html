<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>overtime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <!-- barely-there header -->
    <header id="header">
      <span id="game-time">mon  09:00</span>
      <span id="ot-display" class="hidden">✦ <span id="ot-count">0.0</span>h overtime</span>
      <span id="week-display">wk 1</span>
    </header>

    <!-- everything -->
    <main id="stage">

      <div id="character-wrap">
        <div id="character">( ˘ᵕ˘)</div>
        <div id="speech-bubble" class="hidden"></div>
      </div>

      <div id="status-line">your first day.</div>

      <div id="progress-wrap" class="hidden">
        <div id="progress-track">
          <div id="progress-fill"></div>
        </div>
        <div id="progress-label">0%</div>
      </div>

      <div id="action-area">
        <button id="btn-primary" class="hidden"></button>
      </div>

      <div id="event-card" class="hidden">
        <p id="event-text"></p>
        <div id="event-choices"></div>
      </div>

    </main>

    <!-- upgrade shelf -->
    <div id="upgrade-shelf" class="hidden">
      <button id="shelf-toggle">upgrades  ↓</button>
      <div id="upgrade-grid"></div>
    </div>

    <!-- single-line log -->
    <footer id="log-bar">
      <span id="log-latest"></span>
      <div id="footer-actions">
        <button class="ghost-btn" id="btn-save">save</button>
        <button class="ghost-btn" id="btn-export">export</button>
        <button class="ghost-btn" id="btn-import">import</button>
        <button class="ghost-btn" id="btn-reset">reset</button>
      </div>
    </footer>

  </div>

  <div id="toast-layer"></div>

  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/time.js"></script>
  <script src="js/upgrades.js"></script>
  <script src="js/events.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/save.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
